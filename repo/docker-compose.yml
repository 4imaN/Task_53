name: omnistock

services:
  omnistock-secrets-init:
    image: node:20-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      OMNISTOCK_SECRET_DIR: /run/omnistock-secrets
    command: ["node", "/usr/local/bin/docker-compose-init-secrets.mjs"]
    volumes:
      - runtime-secrets:/run/omnistock-secrets
      - ./scripts/docker-compose-init-secrets.mjs:/usr/local/bin/docker-compose-init-secrets.mjs:ro
    networks:
      - omnistock
    restart: "no"

  omnistock-db:
    image: postgres:16-alpine
    depends_on:
      omnistock-secrets-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnistock}
      POSTGRES_USER: ${POSTGRES_USER:-omnistock}
      POSTGRES_PASSWORD_FILE: /run/omnistock-secrets/postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnistock} -d ${POSTGRES_DB:-omnistock}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - runtime-secrets:/run/omnistock-secrets:ro
    networks:
      - omnistock

  omnistock-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_DB: ${POSTGRES_DB:-omnistock}
      POSTGRES_USER: ${POSTGRES_USER:-omnistock}
      POSTGRES_HOST: omnistock-db
      POSTGRES_PORT: "5432"
      APP_ENV: ${APP_ENV:-production}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      JWT_SECRET: ${JWT_SECRET:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-120}
      ARGON2_MEMORY_COST: ${ARGON2_MEMORY_COST:-19456}
      ARGON2_TIME_COST: ${ARGON2_TIME_COST:-2}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM:-1}
      PASSWORD_HISTORY_DEPTH: ${PASSWORD_HISTORY_DEPTH:-5}
      CAPTCHA_TTL_MINUTES: ${CAPTCHA_TTL_MINUTES:-10}
      CAPTCHA_FAILURE_THRESHOLD: ${CAPTCHA_FAILURE_THRESHOLD:-3}
      LOGIN_LOCKOUT_ATTEMPTS: ${LOGIN_LOCKOUT_ATTEMPTS:-7}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-15}
      UPLOAD_ROOT: ${UPLOAD_ROOT:-/data/uploads}
      UPLOAD_QUOTA_GB: ${UPLOAD_QUOTA_GB:-50}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-0}
      ALLOW_INSECURE_DEV_COOKIES: ${ALLOW_INSECURE_DEV_COOKIES:-0}
      ALLOW_DEV_RATE_LIMIT_LOCALHOST_BYPASS: ${ALLOW_DEV_RATE_LIMIT_LOCALHOST_BYPASS:-0}
      INTEGRATION_RATE_LIMIT: ${INTEGRATION_RATE_LIMIT:-120}
      APP_PORT: ${APP_PORT:-3000}
      OMNISTOCK_SECRET_DIR: /run/omnistock-secrets
    depends_on:
      omnistock-secrets-init:
        condition: service_completed_successfully
      omnistock-db:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
      - runtime-secrets:/run/omnistock-secrets:ro
    expose:
      - "3000"
    networks:
      - omnistock

  omnistock-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - omnistock-api
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - omnistock

volumes:
  postgres-data:
  uploads:
  runtime-secrets:

networks:
  omnistock:
    driver: bridge
